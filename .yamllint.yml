# yamllint configuration for Kubernetes manifests
extends: default

rules:
  # Allow longer lines for Kubernetes manifests (connection strings, etc.)
  line-length:
    max: 150
    level: warning

  # Allow multiple documents in one file (common in K8s)
  document-start: disable

  # Allow empty documents (sometimes needed)
  empty-lines:
    max: 2
    max-start: 0
    max-end: 1

  # Be more lenient with indentation for complex K8s structures
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false

  # Allow truthy values (common in K8s: "true", "false")
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false

  # Allow comments for documentation
  comments:
    min-spaces-from-content: 1

  # Allow brackets for lists (sometimes cleaner in K8s)
  brackets:
    max-spaces-inside: 1
    max-spaces-inside-empty: 0

  # Allow braces for maps
  braces:
    max-spaces-inside: 1
    max-spaces-inside-empty: 0

  # Be more lenient with trailing spaces
  trailing-spaces: disable

  # Allow quoted strings (common in K8s for special values)
  quoted-strings:
    quote-type: any
    required: false

ignore: |
  # Ignore generated or external files
  */node_modules/*
  */target/*
  */dist/*
  .git/*
