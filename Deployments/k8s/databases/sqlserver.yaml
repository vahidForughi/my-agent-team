apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlserver-pvc
  namespace: ecommerce
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eshopping-orderdb
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver-deployment
  namespace: ecommerce
  labels:
    app: sqlserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver
  template:
    metadata:
      labels:
        app: sqlserver
    spec:
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "3Gi"
              cpu: "1500m"
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: sa-password
            - name: MSSQL_PID
              value: "Express"
          volumeMounts:
            - name: sqlserver-storage
              mountPath: /var/opt/mssql
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  /opt/mssql-tools18/bin/sqlcmd \
                    -S localhost -U sa -P "$SA_PASSWORD" \
                    -C -Q "SELECT 1" || \
                  /opt/mssql-tools/bin/sqlcmd \
                    -S localhost -U sa -P "$SA_PASSWORD" \
                    -Q "SELECT 1"
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  /opt/mssql-tools18/bin/sqlcmd \
                    -S localhost -U sa -P "$SA_PASSWORD" \
                    -C -Q "SELECT 1" || \
                  /opt/mssql-tools/bin/sqlcmd \
                    -S localhost -U sa -P "$SA_PASSWORD" \
                    -Q "SELECT 1"
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
      volumes:
        - name: sqlserver-storage
          persistentVolumeClaim:
            claimName: sqlserver-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sqlserver-service
  namespace: ecommerce
spec:
  selector:
    app: sqlserver
  ports:
    - protocol: TCP
      port: 1433
      targetPort: 1433
  type: ClusterIP
