apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eshopping-catalogdb
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshopping-catalogdb
  namespace: default
  labels:
    app.kubernetes.io/name: catalogdb
    app.kubernetes.io/instance: eshopping-catalogdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalogdb
      app.kubernetes.io/instance: eshopping-catalogdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalogdb
        app.kubernetes.io/instance: eshopping-catalogdb
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: catalogdb
          image: mongo:4.4
          ports:
            - containerPort: 27017
          resources: {}
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "admin"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "admin1234"
            - name: MONGO_INITDB_DATABASE
              value: "CatalogDb"
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: eshopping-catalogdb
---
apiVersion: v1
kind: Service
metadata:
  name: eshopping-catalogdb
  namespace: default
spec:
  selector:
    app.kubernetes.io/name: catalogdb
    app.kubernetes.io/instance: eshopping-catalogdb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP
