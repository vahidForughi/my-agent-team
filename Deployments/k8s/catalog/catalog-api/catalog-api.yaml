apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshopping-catalog
  namespace: default
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/instance: eshopping-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog
      app.kubernetes.io/instance: eshopping-catalog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/instance: eshopping-catalog
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: catalog
          image: eshop/catalog.api:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources: {}
---
apiVersion: v1
kind: Service
metadata:
  name: eshopping-catalog
  namespace: default
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/instance: eshopping-catalog
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
