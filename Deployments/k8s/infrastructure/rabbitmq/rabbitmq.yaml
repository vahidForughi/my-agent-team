apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshopping-rabbitmq
  namespace: default
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: eshopping-rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
      app.kubernetes.io/instance: eshopping-rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/instance: eshopping-rabbitmq
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
          resources: {}
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: eshopping-rabbitmq
  namespace: default
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: eshopping-rabbitmq
  ports:
    - name: amqp
      protocol: TCP
      port: 5672
      targetPort: 5672
