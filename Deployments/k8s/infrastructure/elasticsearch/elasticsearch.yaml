apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshopping-elasticsearch
  namespace: default
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/instance: eshopping-elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch
      app.kubernetes.io/instance: eshopping-elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch
        app.kubernetes.io/instance: eshopping-elasticsearch
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:7.9.2
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
          resources: {}
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: elasticsearch-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: eshopping-elasticsearch
  namespace: default
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/instance: eshopping-elasticsearch
  ports:
    - name: http
      protocol: TCP
      port: 9200
      targetPort: 9200
