apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshopping-kibana
  namespace: default
  labels:
    app.kubernetes.io/name: kibana
    app.kubernetes.io/instance: eshopping-kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kibana
      app.kubernetes.io/instance: eshopping-kibana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kibana
        app.kubernetes.io/instance: eshopping-kibana
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:7.9.2
          ports:
            - name: http
              containerPort: 5601
              protocol: TCP
          resources: {}
---
apiVersion: v1
kind: Service
metadata:
  name: eshopping-kibana
  namespace: default
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kibana
    app.kubernetes.io/instance: eshopping-kibana
  ports:
    - name: http
      protocol: TCP
      port: 5601
      targetPort: 5601
