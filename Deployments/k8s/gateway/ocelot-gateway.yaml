apiVersion: v1
kind: ConfigMap
metadata:
  name: ocelot-configuration
  namespace: ecommerce
data:
  ocelot.json: |
    {
      "Routes": [
        {
          "DownstreamPathTemplate": "/api/v1/Catalog",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "catalog-service",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Catalog",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Catalog/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "catalog-service",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Catalog/{everything}",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Basket",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "basket-service",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Basket",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Basket/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "basket-service",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Basket/{everything}",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Ordering",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "ordering-service",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Ordering",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Ordering/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "ordering-service",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Ordering/{everything}",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        }
      ],
      "GlobalConfiguration": {
        "BaseUrl": "http://localhost:8010"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocelot-gateway-deployment
  namespace: ecommerce
  labels:
    app: ocelot-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocelot-gateway
  template:
    metadata:
      labels:
        app: ocelot-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      containers:
        - name: ocelot-gateway
          image: eshop/ocelot.apigw:latest
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "2Gi"
          envFrom:
            - configMapRef:
                name: ocelot-config
          volumeMounts:
            - name: ocelot-config-volume
              mountPath: /app/ocelot.json
              subPath: ocelot.json
            - name: tmp-volume
              mountPath: /tmp
            - name: var-log-volume
              mountPath: /var/log
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          imagePullPolicy: IfNotPresent
      volumes:
        - name: ocelot-config-volume
          configMap:
            name: ocelot-configuration
        - name: tmp-volume
          emptyDir: {}
        - name: var-log-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ocelotapigw-service
  namespace: ecommerce
spec:
  selector:
    app: ocelot-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ocelot-gateway-hpa
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ocelot-gateway-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
