apiVersion: v1
kind: ConfigMap
metadata:
  name: eshopping-gateway-ocelotapigw
  namespace: default
data:
  ocelot.json: |
    {
      "Routes": [
        {
          "DownstreamPathTemplate": "/api/v1/Catalog",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "eshopping-catalog",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Catalog",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Catalog/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "eshopping-catalog",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Catalog/{everything}",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Basket",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "eshopping-basket",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Basket",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Basket/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "eshopping-basket",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Basket/{everything}",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Ordering",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "eshopping-ordering",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Ordering",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        },
        {
          "DownstreamPathTemplate": "/api/v1/Ordering/{everything}",
          "DownstreamScheme": "http",
          "DownstreamHostAndPorts": [
            {
              "Host": "eshopping-ordering",
              "Port": 80
            }
          ],
          "UpstreamPathTemplate": "/Ordering/{everything}",
          "UpstreamHttpMethod": [ "GET", "POST", "PUT", "DELETE" ]
        }
      ],
      "GlobalConfiguration": {
        "BaseUrl": "http://localhost:8010"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshopping-gateway-ocelotapigw
  namespace: default
  labels:
    app.kubernetes.io/name: ocelotapigw
    app.kubernetes.io/instance: eshopping-gateway-ocelotapigw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ocelotapigw
      app.kubernetes.io/instance: eshopping-gateway-ocelotapigw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ocelotapigw
        app.kubernetes.io/instance: eshopping-gateway-ocelotapigw
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      containers:
        - name: ocelotapigw
          image: eshop/ocelot.apigw:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "2Gi"
           envFrom:
             - configMapRef:
                 name: eshopping-gateway-ocelotapigw
          volumeMounts:
            - name: ocelot-config-volume
              mountPath: /app/ocelot.json
              subPath: ocelot.json
            - name: tmp-volume
              mountPath: /tmp
            - name: var-log-volume
              mountPath: /var/log
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          imagePullPolicy: IfNotPresent
      volumes:
        - name: ocelot-config-volume
          configMap:
            name: eshopping-gateway-ocelotapigw
        - name: tmp-volume
          emptyDir: {}
        - name: var-log-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: eshopping-gateway-ocelotapigw
  namespace: default
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval-seconds: "30"
spec:
  selector:
    app.kubernetes.io/name: ocelotapigw
    app.kubernetes.io/instance: eshopping-gateway-ocelotapigw
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eshopping-gateway-ocelotapigw
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eshopping-gateway-ocelotapigw
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
