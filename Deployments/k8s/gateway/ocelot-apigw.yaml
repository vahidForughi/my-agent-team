apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocelot-apigw-deployment
  labels:
    app: ocelot-apigw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocelot-apigw
  template:
    metadata:
      labels:
        app: ocelot-apigw
    spec:
      containers:
        - name: ocelot-apigw
          image: sloweyyy/ocelotapigateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ElasticConfiguration__Uri
              valueFrom:
                configMapKeyRef:
                  name: ocelot-configmap
                  key: ElasticConfiguration__Uri
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          volumeMounts:
            - name: ocelot-config
              mountPath: /app/ocelot.k8s.json
              subPath: ocelot.k8s.json
              readOnly: true
      volumes:
        - name: ocelot-config
          configMap:
            name: ocelot-configmap
            items:
              - key: ocelot.k8s.json
                path: ocelot.k8s.json
---
apiVersion: v1
kind: Service
metadata:
  name: ocelot-apigw-service
spec:
  type: NodePort
  selector:
    app: ocelot-apigw
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 31080
