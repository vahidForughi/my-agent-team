apiVersion: apps/v1
kind: Deployment
metadata:
  name: discount-api-deployment
  labels:
    app: discount-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discount-api
  template:
    metadata:
      labels:
        app: discount-api
    spec:
      containers:
        - name: discount-api
          image: sloweyyy/discountapi:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
            - containerPort: 8080
              name: grpc
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: postgres-configmap
                  key: postgres-url
            - name: ELASTICSEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: elasticsearch-configmap
                  key: elasticsearch-url
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: discount-api-service
spec:
  type: NodePort
  selector:
    app: discount-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 31002
    - name: grpc
      protocol: TCP
      port: 8080
      targetPort: 8080
