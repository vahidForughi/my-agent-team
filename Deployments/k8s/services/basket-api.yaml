apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api-deployment
  namespace: ecommerce
  labels:
    app: basket-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basket-api
  template:
    metadata:
      labels:
        app: basket-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      containers:
        - name: basket-api
          image: eshop/basket.api:latest
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "2Gi"
          envFrom:
            - configMapRef:
                name: basket-config
          env:
            - name: CacheSettings__ConnectionString
              value: "redis-service:6379"
            - name: GrpcSettings__DiscountUrl
              value: "http://discount-service:80"
            - name: EventBusSettings__HostAddress
              value: "amqp://guest:guest@rabbitmq-service:5672"
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: var-log-volume
              mountPath: /var/log
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          imagePullPolicy: IfNotPresent
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: var-log-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: basket-service
  namespace: ecommerce
spec:
  selector:
    app: basket-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: basket-api-hpa
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: basket-api-deployment
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
