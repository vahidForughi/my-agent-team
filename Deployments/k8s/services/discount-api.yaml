apiVersion: apps/v1
kind: Deployment
metadata:
  name: discount-api-deployment
  namespace: ecommerce
  labels:
    app: discount-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discount-api
  template:
    metadata:
      labels:
        app: discount-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      containers:
        - name: discount-api
          image: eshop/discount.grpc:latest
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "2Gi"
          envFrom:
            - configMapRef:
                name: discount-config
          env:
            - name: DatabaseSettings__ConnectionString
              value: >-
                Server=postgres-service;Port=5432;Database=DiscountDb;User Id=admin;Password=password123;
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: var-log-volume
              mountPath: /var/log
          # Health probes commented out - not needed for basic functionality
          # livenessProbe:
          #   httpGet:
          #     path: /
          #     port: 80
          #   initialDelaySeconds: 30
          #   periodSeconds: 30
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /
          #     port: 80
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
          #   timeoutSeconds: 3
          #   failureThreshold: 3
          imagePullPolicy: IfNotPresent
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: var-log-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: discount-service
  namespace: ecommerce
spec:
  selector:
    app: discount-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: discount-api-hpa
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: discount-api-deployment
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
