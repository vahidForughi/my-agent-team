apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer-deployment
  labels:
    app: portainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portainer
  template:
    metadata:
      labels:
        app: portainer
    spec:
      serviceAccountName: portainer-sa
      containers:
        - name: portainer
          image: portainer/portainer-ce:latest
          ports:
            - containerPort: 9000
              name: http
            - containerPort: 8000
              name: edge
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: portainer-data
              mountPath: /data
      volumes:
        - name: portainer-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: portainer-service
spec:
  type: NodePort
  selector:
    app: portainer
  ports:
    - name: http
      protocol: TCP
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: edge
      protocol: TCP
      port: 8000
      targetPort: 8000
