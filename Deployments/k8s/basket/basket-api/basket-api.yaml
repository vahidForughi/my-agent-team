apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api-deployment
  labels:
    app: basket-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basket-api
  template:
    metadata:
      labels:
        app: basket-api
    spec:
      containers:
        - name: basket-api
          image: sloweyyy/basketapi:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: redis-configmap
                  key: redis-url
            - name: GrpcSettings__DiscountUrl
              value: "http://discount-api-service:80"
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-configmap
                  key: rabbitmq-url
            - name: ELASTICSEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: elasticsearch-configmap
                  key: elasticsearch-url
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: basket-api-service
spec:
  type: NodePort
  selector:
    app: basket-api
  ports:
    - protocol: TCP
      port: 9001
      targetPort: 80
      nodePort: 31001
