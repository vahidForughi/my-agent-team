apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: mesh-default
  namespace: istio-system
spec:
  tracing:
  - providers:
    - name: jaeger
    randomSamplingPercentage: 100.0
---
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: jaeger-tracing
  namespace: istio-system
spec:
  meshConfig:
    extensionProviders:
    - name: jaeger
      opentelemetry:
        port: 4317
        service: jaeger-collector.istio-system.svc.cluster.local