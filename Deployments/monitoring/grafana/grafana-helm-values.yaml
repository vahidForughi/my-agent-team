# Grafana Helm Values with Fixed Prometheus Connection
# This file ensures Grafana can connect to Prometheus permanently

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-server.monitoring.svc.cluster.local:80
      access: proxy
      isDefault: true
      editable: true
      jsonData:
        timeInterval: 5s
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
      editable: true
      isDefault: false
      jsonData:
        timeInterval: 5s

# Dashboard providers configuration
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: 'istio'
      orgId: 1
      folder: 'istio'
      type: file
      disableDeletion: false
      options:
        path: /var/lib/grafana/dashboards/istio
    - name: 'istio-services'
      orgId: 1
      folder: 'istio'
      type: file
      disableDeletion: false
      options:
        path: /var/lib/grafana/dashboards/istio-services

# Grafana configuration
grafana.ini:
  analytics:
    check_for_updates: true
  grafana_net:
    url: https://grafana.net
  log:
    mode: console
  paths:
    data: /var/lib/grafana/
    logs: /var/log/grafana
    plugins: /var/lib/grafana/plugins
    provisioning: /etc/grafana/provisioning
  server:
    domain: ''

# Security settings
admin:
  user: admin
  password: prom-operator

# Anonymous access for Istio
auth:
  anonymous:
    enabled: true
    org_role: Admin
  basic:
    enabled: false

# Service configuration
service:
  type: ClusterIP
  port: 3000

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Persistence (optional)
persistence:
  enabled: false

# Security context
securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472
  runAsNonRoot: true

# Pod annotations to disable Istio injection
podAnnotations:
  sidecar.istio.io/inject: "false"
