{{- $name := include "basket.fullname" . -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: "cfg-{{ $name }}"
  labels:
    app: {{ template "basket.name" . }}
    chart: {{ template "basket.chart" .}}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
data:
  EventBusSettings__HostAddress: amqp://guest:guest@eshopping-rabbitmq:5672
  CacheSettings__ConnectionString: eshopping-basketdb:6379
  GrpcSettings__DiscountUrl: http://eshopping-discount-discount-grpc:8080
  ElasticConfiguration__Uri: http://eshopping-elasticsearch:9200