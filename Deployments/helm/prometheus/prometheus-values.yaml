server:
  extraArgs:
    web.enable-remote-write-receiver: ""
  persistentVolume:
    enabled: true
    size: 10Gi
  service:
    type: ClusterIP
  ingress:
    enabled: false

alertmanager:
  enabled: true
  persistentVolume:
    enabled: true
    size: 2Gi

nodeExporter:
  enabled: true

pushgateway:
  enabled: true

serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: 'ecommerce-services'
        kubernetes_sd_configs:
        - role: service
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
          action: keep
          regex: true

      # PushGateway scraping for k6 load testing metrics
      - job_name: 'pushgateway'
        honor_labels: true
        static_configs:
          - targets: ['prometheus-pushgateway:9091']
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: 'k6_.*'
            action: keep
