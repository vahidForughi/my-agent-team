# Default values for catalog.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
pathBase: /Catalog

image:
  registry: ""
  repository: catalogapi
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  sidecar.istio.io/inject: "true"

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  values:
  - name: ASPNETCORE_ENVIRONMENT
    value: Development
  - name: AWS_ACCESS_KEY_ID
    value: ""  # IRSA will provide credentials on AWS; set to "test" for LocalStack
  - name: AWS_SECRET_ACCESS_KEY
    value: ""  # IRSA will provide credentials on AWS; set to "test" for LocalStack
  - name: AWS_ENDPOINT_URL
    value: ""  # Empty for AWS S3; set to "http://localstack:4566" for local dev
  urls:
  # configmap declares variables which value is taken from the config map defined in template configmap.yaml (name is name of var and key the key in configmap).
  configmap:
    - name: DatabaseSettings__ConnectionString
      key: DatabaseSettings__ConnectionString
    - name: DatabaseSettings__DatabaseName
      key: DatabaseSettings__DatabaseName
    - name: DatabaseSettings__CollectionName
      key: DatabaseSettings__CollectionName
    - name: DatabaseSettings__BrandsCollection
      key: DatabaseSettings__BrandsCollection
    - name: DatabaseSettings__TypesCollection
      key: DatabaseSettings__TypesCollection
    - name: ElasticConfiguration__Uri
      key: ElasticConfiguration__Uri
    - name: EventBusSettings__HostAddress
      key: EventBusSettings__HostAddress
    - name: AWS__S3__BucketName
      key: AWS__S3__BucketName
    - name: AWS__S3__Region
      key: AWS__S3__Region
    - name: AWS__S3__ImagePrefix
      key: AWS__S3__ImagePrefix
    - name: AWS__S3__ServiceUrl
      key: AWS__S3__ServiceUrl
    - name: USE_LOCALSTACK
      key: USE_LOCALSTACK

# ConfigMap data values (used by templates/configmap.yaml)
# Override these for different environments
configmap:
  DatabaseSettings__ConnectionString: "mongodb://admin:admin1234@eshopping-catalogdb:27017/CatalogDb?authSource=admin&serverSelectionTimeoutMS=60000&connectTimeoutMS=60000"
  DatabaseSettings__DatabaseName: "CatalogDb"
  DatabaseSettings__CollectionName: "Products"
  DatabaseSettings__BrandsCollection: "Brands"
  DatabaseSettings__TypesCollection: "Types"
  ElasticConfiguration__Uri: "http://eshopping-elasticsearch:9200"
  EventBusSettings__HostAddress: "eshopping-rabbitmq:5672"
  AWS__S3__BucketName: "ecommerce-product-images"
  AWS__S3__Region: "us-east-1"
  AWS__S3__ImagePrefix: "products/"
  AWS__S3__ServiceUrl: ""  # Empty for AWS S3; set to "http://localstack:4566" for local dev
  USE_LOCALSTACK: "false"  # false for AWS; set to "true" for local dev with LocalStack
