{{- $name := include "catalog.fullname" . -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: "cfg-{{ $name }}"
  labels:
    app: {{ template "catalog.name" . }}
    chart: {{ template "catalog.chart" .}}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
data:
  DatabaseSettings__ConnectionString: mongodb://admin:admin1234@catalogdb:27017/CatalogDb?authSource=admin
  DatabaseSettings__DatabaseName: CatalogDb
  DatabaseSettings__CollectionName: Products
  DatabaseSettings__BrandsCollection: Brands
  DatabaseSettings__TypesCollection: Types
  ElasticConfiguration__Uri: http://elasticsearch:9200
  AWS__S3__BucketName: ecommerce-product-images
  AWS__S3__Region: us-east-1
  AWS__S3__ImagePrefix: products/
  AWS__S3__ServiceUrl: http://localstack:4566
  USE_LOCALSTACK: "true"