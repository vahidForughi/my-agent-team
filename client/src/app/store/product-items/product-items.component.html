<div class="product-card" *ngIf="product">
  <!-- Product Image -->
  <div class="product-image-container" [routerLink]="['/store', product.id]">
    <img [src]="product.imageFile" [alt]="product.name" class="product-image" />

    <!-- Badges can be dynamically added here like "New" or "Sale" -->
    <span class="product-badge">New</span>
    <span class="discount-tag" *ngIf="product.hasDiscount">SALE</span>

    <!-- Quick Action Buttons -->
    <div class="product-actions">
      <button (click)="addItemToBasket()" class="action-btn" title="Add to Cart">
        <i class="fa fa-shopping-cart"></i>
      </button>
      <button class="action-btn" title="Add to Wishlist">
        <i class="fa fa-heart"></i>
      </button>
    </div>
  </div>

  <!-- Product Info -->
  <div class="product-info">
    <!-- Product Category -->
    <div class="product-category">{{ product.productType }}</div>

    <!-- Product Name -->
    <h3 class="product-name" [routerLink]="['/store', product.id]">{{ product.name }}</h3>

    <!-- Product Rating -->
    <div class="product-rating">
      <span class="stars">
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
        <i class="fa fa-star-half-o"></i>
      </span>
      <span class="review-count">(42)</span>
    </div>

    <!-- Product Price -->
    <div class="product-price-row">
      <!-- Show discounted price if there's a discount -->
      <div class="price-container" *ngIf="product.hasDiscount; else normalPrice">
        <span class="original-price">{{ product.originalPrice | currency: "VND" }}</span>
        <span class="discount-badge">-{{ product.discountAmount | currency: "VND" }}</span>
        <span class="discounted-price">{{ product.price | currency: "VND" }} 💰</span>
        <div class="savings-text">Save {{ product.discountAmount | currency: "VND" }}!</div>
      </div>

      <!-- Normal price template -->
      <ng-template #normalPrice>
        <span class="product-price">{{ product.price | currency: "VND" }}</span>
      </ng-template>

      <!-- Add to Cart Button (visible on mobile) -->
      <button (click)="addItemToBasket()" class="cart-btn-mobile">
        <i class="fa fa-shopping-cart"></i>
      </button>
    </div>
  </div>
</div>
