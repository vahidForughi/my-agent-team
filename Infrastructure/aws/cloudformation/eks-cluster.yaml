AWSTemplateFormatVersion: '2010-09-09'
Description: EKS cluster with managed node group (dev) in existing VPC for app services and self-managed DBs

Parameters:
  EnvName:
    Type: String
    Default: dev
  ClusterName:
    Type: String
    Default: ecommerce-eks
  KubernetesVersion:
    Type: String
    Default: "1.30"
    AllowedValues:
      - "1.29"
      - "1.30"
      - "1.31"
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for EKS data plane
  NodeInstanceType:
    Type: String
    Default: m7i-flex.large
  NodeDesiredCapacity:
    Type: Number
    Default: 2
  NodeMinSize:
    Type: Number
    Default: 1
  NodeMaxSize:
    Type: Number
    Default: 3
  NodeDiskSize:
    Type: Number
    Default: 80
    Description: EBS volume size (GiB) per worker node to host pods and persistent volumes

Resources:
  EksClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      Tags:
        - Key: Name
          Value: !Sub ${EnvName}-eks-cluster-role

  EksCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      RoleArn: !GetAtt EksClusterRole.Arn
      Version: !Ref KubernetesVersion
      ResourcesVpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        EndpointPrivateAccess: true
        EndpointPublicAccess: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvName}-eks-cluster

  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
      Tags:
        - Key: Name
          Value: !Sub ${EnvName}-eks-node-role

  NodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref NodeRole]
      Path: "/"

  # Launch Template with proper prefix delegation configuration
  NodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        MetadataOptions:
          HttpPutResponseHopLimit: 2
          HttpTokens: optional
        UserData:
          Fn::Base64: |
            #!/bin/bash
            # Enable AWS VPC CNI prefix delegation for higher pod density
            export ENABLE_PREFIX_DELEGATION=true
            export WARM_PREFIX_TARGET=1

  ManagedNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EksCluster
    Properties:
      ClusterName: !Ref ClusterName
      NodeRole: !GetAtt NodeRole.Arn
      ScalingConfig:
        DesiredSize: !Ref NodeDesiredCapacity
        MinSize: !Ref NodeMinSize
        MaxSize: !Ref NodeMaxSize
      Subnets: !Ref PrivateSubnetIds
      InstanceTypes:
        - !Ref NodeInstanceType
        - t3.small
        - t3.medium
        - t3.large
      CapacityType: ON_DEMAND
      AmiType: AL2023_x86_64_STANDARD
      DiskSize: !Ref NodeDiskSize
      LaunchTemplate:
        Id: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        Name: !Sub ${EnvName}-nodegroup

Outputs:
  ClusterName:
    Value: !Ref ClusterName
    Export:
      Name: !Sub ${EnvName}-eks-cluster-name
  ClusterSecurityGroup:
    Value: !GetAtt EksCluster.ClusterSecurityGroupId
    Export:
      Name: !Sub ${EnvName}-eks-cluster-sg
  NodeInstanceRoleArn:
    Value: !GetAtt NodeRole.Arn
    Export:
      Name: !Sub ${EnvName}-eks-node-role-arn
