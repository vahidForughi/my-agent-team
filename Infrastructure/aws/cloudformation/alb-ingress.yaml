AWSTemplateFormatVersion: '2010-09-09'
Description: Application Load Balancer for API ingress (dev)

Parameters:
  EnvName:
    Type: String
    Default: dev
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  TargetSubnetType:
    Type: String
    Default: ip
    AllowedValues: [instance, ip]
    Description: Target type for target group (ip recommended for EKS)
  TargetPort:
    Type: Number
    Default: 80
    Description: Port exposed by API Gateway service (e.g., Ocelot)

Resources:
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvName}-alb-sg

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvName}-api-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups: [!Ref AlbSecurityGroup]
      Subnets: !Ref PublicSubnetIds
      IpAddressType: ipv4
      Tags:
        - Key: Name
          Value: !Sub ${EnvName}-api-alb

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvName}-api-tg
      Port: !Ref TargetPort
      Protocol: HTTP
      TargetType: !Ref TargetSubnetType
      VpcId: !Ref VpcId
      HealthCheckPath: /
      Matcher:
        HttpCode: 200-399
      Tags:
        - Key: Name
          Value: !Sub ${EnvName}-api-tg

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP

Outputs:
  AlbDnsName:
    Value: !GetAtt Alb.DNSName
    Export:
      Name: !Sub ${EnvName}-alb-dns
  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub ${EnvName}-alb-sg
  ApiTargetGroupArn:
    Value: !Ref TargetGroup
    Export:
      Name: !Sub ${EnvName}-api-tg
