name: Docker Build & Publish

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      images-pushed: ${{ steps.push-check.outputs.pushed }}
      image-tags: ${{ steps.meta.outputs.tags }}
    strategy:
      matrix:
        service:
          - name: catalog-api
            context: .
            dockerfile: ./Services/Catalog/Catalog.API/Dockerfile
          - name: basket-api
            context: .
            dockerfile: ./Services/Basket/Basket.API/Dockerfile
          - name: discount-api
            context: .
            dockerfile: ./Services/Discount/Discount.API/Dockerfile
          - name: ordering-api
            context: .
            dockerfile: ./Services/Ordering/Ordering.API/Dockerfile
          - name: ocelot-gateway
            context: .
            dockerfile: ./ApiGateways/Ocelot.ApiGateway/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=main-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Check if images were pushed
        id: push-check
        run: |
          echo "pushed=true" >> $GITHUB_OUTPUT

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.outputs.images-pushed == 'true'
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            { name: "catalog-api" },
            { name: "basket-api" },
            { name: "discount-api" },
            { name: "ordering-api" },
            { name: "ocelot-gateway" },
          ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: get-tag
        run: |
          # Echo available tags for debugging
          echo "Available tags: ${{ needs.build-and-push.outputs.image-tags }}"

          # Set a fallback tag (latest) in case we can't determine the right one
          TAG="latest"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_TAG="pr-${{ github.event.number }}"
            echo "Using PR tag: $PR_TAG"
            TAG=$PR_TAG
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG="latest"
            echo "Using latest tag for main branch"
          else
            # For other branches use the branch name
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            TAG=$BRANCH_NAME
            echo "Using branch name as tag: $TAG"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        id: trivy-scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}:${{ steps.get-tag.outputs.tag }}
          format: "sarif"
          output: "trivy-results-${{ matrix.service.name }}.sarif"
          timeout: "10m0s" # Increase timeout to 10 minutes
        continue-on-error: true

      - name: List files in directory
        run: |
          ls -la
          echo "Checking for SARIF file: trivy-results-${{ matrix.service.name }}.sarif"
          if [ -f "trivy-results-${{ matrix.service.name }}.sarif" ]; then
            echo "SARIF file exists"
          else
            echo "SARIF file not found"
          fi

      - name: Check if SARIF file exists and has content
        id: check-sarif
        run: |
          if [ -f "trivy-results-${{ matrix.service.name }}.sarif" ] && [ -s "trivy-results-${{ matrix.service.name }}.sarif" ]; then
            echo "sarif-exists=true" >> $GITHUB_OUTPUT
            echo "SARIF file found with content"
          else
            echo "sarif-exists=false" >> $GITHUB_OUTPUT
            echo "SARIF file not found or empty"
            
            # Create minimal valid SARIF file to prevent upload failure
            echo '{
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [
                {
                  "tool": {
                    "driver": {
                      "name": "Trivy",
                      "informationUri": "https://github.com/aquasecurity/trivy",
                      "rules": []
                    }
                  },
                  "results": []
                }
              ]
            }' > "trivy-results-${{ matrix.service.name }}.sarif"
          fi

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results-${{ matrix.service.name }}.sarif"
          category: "trivy-${{ matrix.service.name }}"
