name: Docker Build & Publish

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      images-pushed: ${{ steps.push-check.outputs.pushed }}
      image-tags: ${{ steps.meta.outputs.tags }}
    strategy:
      matrix:
        service:
          - name: catalog-api
            context: .
            dockerfile: ./Services/Catalog/Catalog.API/Dockerfile
          - name: basket-api
            context: .
            dockerfile: ./Services/Basket/Basket.API/Dockerfile
          - name: discount-api
            context: .
            dockerfile: ./Services/Discount/Discount.API/Dockerfile
          - name: ordering-api
            context: .
            dockerfile: ./Services/Ordering/Ordering.API/Dockerfile
          - name: ocelot-gateway
            context: .
            dockerfile: ./ApiGateways/Ocelot.ApiGateway/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=main-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Check if images were pushed
        id: push-check
        run: |
          echo "pushed=true" >> $GITHUB_OUTPUT

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.outputs.images-pushed == 'true'
    strategy:
      matrix:
        service:
          [
            { name: "catalog-api" },
            { name: "basket-api" },
            { name: "discount-api" },
            { name: "ordering-api" },
            { name: "ocelot-gateway" },
          ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=main-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}:${{ steps.get-tag.outputs.tag }}
          format: "sarif"
          output: "trivy-results-${{ matrix.service.name }}.sarif"
        continue-on-error: true

      - name: Check if SARIF file exists
        id: check-sarif
        run: |
          if [ -f "trivy-results-${{ matrix.service.name }}.sarif" ]; then
            echo "sarif-exists=true" >> $GITHUB_OUTPUT
          else
            echo "sarif-exists=false" >> $GITHUB_OUTPUT
            echo "SARIF file not found, likely due to scan failure"
          fi

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: steps.check-sarif.outputs.sarif-exists == 'true'
        with:
          sarif_file: "trivy-results-${{ matrix.service.name }}.sarif"
