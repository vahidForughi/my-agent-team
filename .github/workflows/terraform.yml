name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # Needed to post plan output as PR comment

env:
  TF_DIR: terraform
  TF_VERSION: "1.14.8"

jobs:
  # -------------------------------------------------------
  # Format check — enforces consistent style
  # -------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform -chdir=${{ env.TF_DIR }} fmt -check -recursive -diff

  # -------------------------------------------------------
  # Validate — catches syntax errors and bad references
  # -------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_DIR }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

  # -------------------------------------------------------
  # TFLint — catches AWS-specific issues (invalid types, etc.)
  # -------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init
        working-directory: ${{ env.TF_DIR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --recursive --format compact
        working-directory: ${{ env.TF_DIR }}

  # -------------------------------------------------------
  # Security scan — finds misconfigurations before deploy
  # -------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy (IaC security scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ${{ env.TF_DIR }}
          exit-code: 0 # Warn but don't block PRs (tighten later)
          severity: HIGH,CRITICAL

  # -------------------------------------------------------
  # Plan — shows what would change (PR only)
  # -------------------------------------------------------
  plan:
    name: Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [fmt, validate, lint]
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_DIR }} init

      - name: Terraform plan
        id: plan
        run: terraform -chdir=${{ env.TF_DIR }} plan -no-color -input=false 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('plan_output.txt', 'utf8');

            // Truncate if too long for a GH comment (max 65536 chars)
            if (plan.length > 60000) {
              plan = plan.substring(0, 60000) + '\n\n... (truncated)';
            }

            const outcome = '${{ steps.plan.outcome }}';
            const icon = outcome === 'success' ? '✅' : '❌';

            const body = `### ${icon} Terraform Plan

            <details><summary>Show plan output</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>

            *Plan: ${outcome}*`;

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('Terraform Plan') && c.user.type === 'Bot'
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
