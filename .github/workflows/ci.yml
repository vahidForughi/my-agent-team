name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20.19.0"
  DOCKER_BUILDKIT: 1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      docker: ${{ steps.changes.outputs.docker }}
      k8s: ${{ steps.changes.outputs.k8s }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            backend:
              - 'Services/**'
              - 'ApiGateways/**'
              - 'Infrastructure/**'
              - '*.sln'
              - '**/*.csproj'
            frontend:
              - 'micro-frontends/**'
            docker:
              - 'docker-compose*.yml'
              - '**/Dockerfile'
            k8s:
              - 'Deployments/**'

  code-quality:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Ecommerce.sln

      - name: Build solution
        run: dotnet build Ecommerce.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Ecommerce.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Create coverage directory
        run: mkdir -p coverage

      - name: Find coverage files
        run: find ./coverage -name "*.xml" -type f -exec ls -la {} \;

      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        continue-on-error: true
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "60 80"

      - name: Add Coverage PR Comment
        if: github.event_name == 'pull_request'
        run: |
          if [ -f "code-coverage-results.md" ]; then
            echo "Posting code coverage results to PR"
            gh pr comment ${{ github.event.pull_request.number }} --body-file code-coverage-results.md
          else
            echo "No code coverage results file found - skipping PR comment"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          severity: "CRITICAL,HIGH"
          output: "trivy-results.sarif"
          skip-dirs: "client/node_modules,micro-frontends/node_modules"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      # Initialize CodeQL before analysis
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp, javascript

      # Autobuild attempts to build any compiled languages
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      # Run CodeQL Analysis for both languages
      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  frontend-quality:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: ./micro-frontends
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: micro-frontends/package-lock.json

      - name: Cache Nx
        uses: actions/cache@v5
        with:
          path: |
            micro-frontends/.nx/cache
            micro-frontends/node_modules/.cache
          key: ${{ runner.os }}-nx-${{ hashFiles('micro-frontends/package-lock.json') }}-${{ hashFiles('micro-frontends/**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ hashFiles('micro-frontends/package-lock.json') }}-
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: npm ci

      - name: Derive SHAs for affected commands
        uses: nrwl/nx-set-shas@v5

      - name: Lint affected
        run: npx nx affected --target=lint --base=$NX_BASE --head=$NX_HEAD

      - name: Run tests affected
        run: npx nx affected --target=test --base=$NX_BASE --head=$NX_HEAD --passWithNoTests

      - name: Build affected
        run: npx nx affected --target=build --base=$NX_BASE --head=$NX_HEAD

  docker-build:
    runs-on: ubuntu-latest
    needs: [code-quality, frontend-quality]
    if: always() && (needs.code-quality.result == 'success' || needs.code-quality.result == 'skipped') && (needs.frontend-quality.result == 'success' || needs.frontend-quality.result == 'skipped')
    strategy:
      matrix:
        service:
          [
            { name: "catalog-api", path: "Services/Catalog/Catalog.API" },
            { name: "basket-api", path: "Services/Basket/Basket.API" },
            { name: "discount-api", path: "Services/Discount/Discount.API" },
            { name: "ordering-api", path: "Services/Ordering/Ordering.API" },
            { name: "ocelot-gateway", path: "ApiGateways/Ocelot.ApiGateway" },
          ]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.service.path }}/Dockerfile
          push: false
          tags: ${{ matrix.service.name }}:ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'pull_request'
    continue-on-error: true
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: discountdb
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'ci-test-password-only' }}
        ports:
          - 5432:5432
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run integration tests
        run: |
          # Make sure TestResults directory exists
          mkdir -p ./TestResults

          # Run test with solution file explicitly specified
          dotnet test Ecommerce.sln \
            --configuration Release \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-tests.trx" \
            --results-directory ./TestResults || true

          # List the test results to confirm they exist
          ls -la ./TestResults || echo "No test results generated"

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        continue-on-error: true
        with:
          name: Integration Tests
          path: ./TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: false

  kubernetes-validation:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.k8s == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "latest"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: "latest"

      - name: Set up kubescore
        run: |
          wget https://github.com/zegl/kube-score/releases/download/v1.16.1/kube-score_1.16.1_linux_amd64.tar.gz
          tar xf kube-score_1.16.1_linux_amd64.tar.gz
          sudo mv kube-score /usr/local/bin
        continue-on-error: true

      - name: Lint Helm charts
        run: |
          echo "🔍 Linting Helm charts..."
          for chart in Deployments/helm/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting $chart"
              helm lint "$chart"
            fi
          done

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate Kubernetes manifests
        run: |
          chmod +x .github/scripts/validate-k8s-manifests.sh
          .github/scripts/validate-k8s-manifests.sh

  notify-status:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    needs: [code-quality, frontend-quality, docker-build, kubernetes-validation]
    if: always()
    steps:
      - name: Notify PR status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const jobs = {
              'code-quality': '${{ needs.code-quality.result }}',
              'frontend-quality': '${{ needs.frontend-quality.result }}',
              'docker-build': '${{ needs.docker-build.result }}',
              'kubernetes-validation': '${{ needs.kubernetes-validation.result }}'
            };

            const results = Object.entries(jobs)
              .filter(([name, result]) => result !== 'skipped')
              .map(([name, result]) => `${result === 'success' ? '✅' : '❌'} ${name}: ${result}`)
              .join('\n');

            const overallStatus = Object.values(jobs)
              .filter(result => result !== 'skipped')
              .every(result => result === 'success') ? '✅ All checks passed!' : '❌ Some checks failed';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Pipeline Results\n\n${overallStatus}\n\n### Job Results:\n${results}\n\nCheck the [Actions tab](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`
            });
