name: Performance Testing (K6)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of performance test'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike
          - soak
      target_url:
        description: 'Target gateway URL (leave empty for default)'
        required: false
        type: string
  schedule:
    - cron: '0 4 * * MON'  # Weekly Monday 4 AM UTC (smoke test)

concurrency:
  group: perf-test
  cancel-in-progress: false

jobs:
  k6-test:
    name: K6 ${{ github.event.inputs.test_type || 'smoke' }} test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: discountdb
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'ci-test-password-only' }}
        ports:
          - 5432:5432
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Build and start services
        run: |
          dotnet build Ecommerce.sln --configuration Release

          # Start all microservices in background
          cd Services/Catalog/Catalog.API && dotnet run --configuration Release --no-build --urls "http://0.0.0.0:8001" & cd ../../..
          cd Services/Basket/Basket.API && dotnet run --configuration Release --no-build --urls "http://0.0.0.0:8002" & cd ../../..
          cd Services/Ordering/Ordering.API && dotnet run --configuration Release --no-build --urls "http://0.0.0.0:8004" & cd ../../..

          # Start API Gateway
          cd ApiGateways/Ocelot.ApiGateway && dotnet run --configuration Release --no-build --urls "http://0.0.0.0:8010" & cd ../..

          # Wait for services to start
          echo "Waiting for services to start..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8010/health && break || sleep 2
          done

      - name: Run K6 test
        env:
          TEST_TYPE: ${{ github.event.inputs.test_type || 'smoke' }}
          AWS_GATEWAY_URL: ${{ github.event.inputs.target_url || 'http://localhost:8010' }}
        run: |
          cd tests/k6
          k6 run \
            --out json=results.json \
            --tag testType=$TEST_TYPE \
            load-test.js

      - name: Generate test summary
        if: always()
        run: |
          echo "## K6 Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Type:** ${{ github.event.inputs.test_type || 'smoke' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tests/k6/results.json ]; then
            echo "Results file generated successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "No results file generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-results-${{ github.event.inputs.test_type || 'smoke' }}-${{ github.run_number }}
          path: tests/k6/results.json
          retention-days: 30
