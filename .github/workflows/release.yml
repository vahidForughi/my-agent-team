name: Release Management

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  analyze-changes:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.semantic.outputs.new_release_published }}
      new_version: ${{ steps.semantic.outputs.new_release_version }}
      release_notes: ${{ steps.semantic.outputs.new_release_notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      
      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github
      
      - name: Run semantic-release (dry-run)
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual release
            current_version=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            case "${{ github.event.inputs.release_type }}" in
              "major")
                new_version=$(echo $current_version | awk -F. '{print $1"."($2+1)".0"}' | sed 's/v//')
                ;;
              "minor")
                new_version=$(echo $current_version | awk -F. '{print $1"."$2"."($3+1)}' | sed 's/v//')
                ;;
              "patch")
                new_version=$(echo $current_version | awk -F. '{print $1"."$2"."($3+1)}' | sed 's/v//')
                ;;
              "prerelease")
                new_version=$(echo $current_version | sed 's/v//')-beta.$(date +%s)
                ;;
            esac
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=v$new_version" >> $GITHUB_OUTPUT
            echo "new_release_notes=Manual ${{ github.event.inputs.release_type }} release" >> $GITHUB_OUTPUT
          else
            # Automatic semantic release
            npx semantic-release --dry-run | tee semantic-output.txt
            
            if grep -q "The next release version is" semantic-output.txt; then
              echo "new_release_published=true" >> $GITHUB_OUTPUT
              version=$(grep "The next release version is" semantic-output.txt | awk '{print $NF}')
              echo "new_release_version=$version" >> $GITHUB_OUTPUT
              echo "new_release_notes=Automated semantic release" >> $GITHUB_OUTPUT
            else
              echo "new_release_published=false" >> $GITHUB_OUTPUT
            fi
          fi

  create-release:
    runs-on: ubuntu-latest
    needs: analyze-changes
    if: needs.analyze-changes.outputs.should_release == 'true'
    outputs:
      version: ${{ needs.analyze-changes.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$previous_tag" ]; then
            echo "No previous tag found, generating full changelog"
            git log --pretty=format:"- %s (%h)" > CHANGELOG_TEMP.md
          else
            echo "Generating changelog since $previous_tag"
            git log $previous_tag..HEAD --pretty=format:"- %s (%h)" > CHANGELOG_TEMP.md
          fi
          
          # Categorize commits
          cat > RELEASE_NOTES.md << EOF
          ## What's Changed
          
          ### 🚀 Features
          $(grep -i "feat\|feature" CHANGELOG_TEMP.md || echo "- No new features")
          
          ### 🐛 Bug Fixes
          $(grep -i "fix\|bug" CHANGELOG_TEMP.md || echo "- No bug fixes")
          
          ### 🔧 Improvements
          $(grep -i "improve\|enhance\|refactor" CHANGELOG_TEMP.md || echo "- No improvements")
          
          ### 📚 Documentation
          $(grep -i "doc\|readme" CHANGELOG_TEMP.md || echo "- No documentation updates")
          
          ### 🔐 Security
          $(grep -i "security\|vulnerability" CHANGELOG_TEMP.md || echo "- No security updates")
          
          ### 🏗️ Infrastructure
          $(grep -i "ci\|cd\|workflow\|docker\|k8s\|helm" CHANGELOG_TEMP.md || echo "- No infrastructure changes")
          
          ### Other Changes
          $(grep -v -i "feat\|feature\|fix\|bug\|improve\|enhance\|refactor\|doc\|readme\|security\|vulnerability\|ci\|cd\|workflow\|docker\|k8s\|helm" CHANGELOG_TEMP.md || echo "- No other changes")
          
          ## Docker Images
          All services are available as Docker images:
          - \`ghcr.io/${{ github.repository }}/catalog-api:${{ needs.analyze-changes.outputs.new_version }}\`
          - \`ghcr.io/${{ github.repository }}/basket-api:${{ needs.analyze-changes.outputs.new_version }}\`
          - \`ghcr.io/${{ github.repository }}/discount-api:${{ needs.analyze-changes.outputs.new_version }}\`
          - \`ghcr.io/${{ github.repository }}/ordering-api:${{ needs.analyze-changes.outputs.new_version }}\`
          - \`ghcr.io/${{ github.repository }}/ocelot-gateway:${{ needs.analyze-changes.outputs.new_version }}\`
          
          ## Helm Deployment
          \`\`\`bash
          helm upgrade --install ecommerce-platform ./Deployments/helm/platform \\
            --set global.image.tag=${{ needs.analyze-changes.outputs.new_version }}
          \`\`\`
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/$previous_tag...${{ needs.analyze-changes.outputs.new_version }}
          EOF
      
      - name: Create and push tag
        run: |
          git tag ${{ needs.analyze-changes.outputs.new_version }}
          git push origin ${{ needs.analyze-changes.outputs.new_version }}
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.analyze-changes.outputs.new_version }}
          release_name: Release ${{ needs.analyze-changes.outputs.new_version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(needs.analyze-changes.outputs.new_version, 'beta') || contains(needs.analyze-changes.outputs.new_version, 'alpha') || contains(needs.analyze-changes.outputs.new_version, 'rc') }}

  update-changelog:
    runs-on: ubuntu-latest
    needs: [analyze-changes, create-release]
    if: needs.analyze-changes.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update CHANGELOG.md
        run: |
          # Create or update CHANGELOG.md
          if [ ! -f CHANGELOG.md ]; then
            cat > CHANGELOG.md << EOF
          # Changelog
          
          All notable changes to this project will be documented in this file.
          
          The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
          and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
          
          EOF
          fi
          
          # Prepare new entry
          cat > NEW_ENTRY.md << EOF
          ## [${{ needs.analyze-changes.outputs.new_version }}] - $(date +%Y-%m-%d)
          
          $(cat RELEASE_NOTES.md)
          
          EOF
          
          # Insert new entry after the header
          sed -i '/^# Changelog/r NEW_ENTRY.md' CHANGELOG.md
          
          # Clean up
          rm -f NEW_ENTRY.md RELEASE_NOTES.md CHANGELOG_TEMP.md
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name: Commit and push changelog
        run: |
          git add CHANGELOG.md
          git commit -m "docs: update changelog for ${{ needs.analyze-changes.outputs.new_version }} [skip ci]"
          git push origin main

  notify-release:
    runs-on: ubuntu-latest
    needs: [analyze-changes, create-release, update-changelog]
    if: needs.analyze-changes.outputs.should_release == 'true'
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              attachments: [{
                color: 'good',
                title: '🎉 New Release Published!',
                text: `Version ${{ needs.analyze-changes.outputs.new_version }} has been released`,
                fields: [
                  {
                    title: 'Release Notes',
                    value: 'https://github.com/${{ github.repository }}/releases/tag/${{ needs.analyze-changes.outputs.new_version }}',
                    short: true
                  },
                  {
                    title: 'Docker Images',
                    value: 'Available on GitHub Container Registry',
                    short: true
                  }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Create announcement issue
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎉 Release ${{ needs.analyze-changes.outputs.new_version }} is now available!`,
              body: `## New Release Available

            **Version:** ${{ needs.analyze-changes.outputs.new_version }}
            **Release Date:** ${new Date().toISOString().split('T')[0]}

            ### 🚀 Quick Start
            \`\`\`bash
            # Pull the latest Docker images
            docker pull ghcr.io/${{ github.repository }}/catalog-api:${{ needs.analyze-changes.outputs.new_version }}
            docker pull ghcr.io/${{ github.repository }}/basket-api:${{ needs.analyze-changes.outputs.new_version }}
            docker pull ghcr.io/${{ github.repository }}/discount-api:${{ needs.analyze-changes.outputs.new_version }}
            docker pull ghcr.io/${{ github.repository }}/ordering-api:${{ needs.analyze-changes.outputs.new_version }}
            docker pull ghcr.io/${{ github.repository }}/ocelot-gateway:${{ needs.analyze-changes.outputs.new_version }}

            # Deploy with Helm
            helm upgrade --install ecommerce-platform ./Deployments/helm/platform \\
              --set global.image.tag=${{ needs.analyze-changes.outputs.new_version }}
            \`\`\`

            ### 📖 What's New
            Check out the [full release notes](https://github.com/${{ github.repository }}/releases/tag/${{ needs.analyze-changes.outputs.new_version }}) for detailed information about this release.

            ### 🐛 Found an Issue?
            If you encounter any problems with this release, please [create an issue](https://github.com/${{ github.repository }}/issues/new/choose).

            ---
            *This issue was automatically created by the release workflow.*`,
              labels: ['announcement', 'release']
            }) 