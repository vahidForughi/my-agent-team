name: 🐛 Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
projects: ["sloweyyy/cloud-native-ecommerce-platform"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! 🐛
        
        Please fill out the sections below to help us understand and reproduce the issue.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm that you have completed the following
      options:
        - label: I have searched existing issues to ensure this bug hasn't been reported
          required: true
        - label: I have read the documentation
          required: true
        - label: I am using the latest version of the platform
          required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Frontend (React Nx host)
        - Frontend (Store MFE)
        - Frontend (Checkout MFE)
        - Frontend (Account MFE)
        - Frontend (Admin MFE)
        - Frontend (Angular legacy)
        - API Gateway (Ocelot)
        - Catalog Service
        - Basket Service
        - Discount Service (REST/gRPC)
        - Ordering Service
        - S3 / LocalStack assets
        - Istio / Ingress / OIDC
        - Kubernetes / Deployment scripts
        - Monitoring (Prometheus/Grafana)
        - Tracing / Mesh (Jaeger/Kiali)
        - Load testing (k6)
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical - System is unusable
        - High - Major functionality is affected
        - Medium - Some functionality is affected
        - Low - Minor issue or cosmetic
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Information about your environment
      placeholder: |
        - OS: [e.g. Ubuntu 20.04, Windows 10, macOS 12]
        - Docker Version: [e.g. 20.10.x]
        - Kubernetes Version: [e.g. 1.27+]
        - Istio Version (if applicable): [e.g. 1.20.x]
        - Node.js Version (frontend): [e.g. 18.x]
        - Browser: [e.g. Chrome 119, Firefox 118] (if frontend issue)
        - Platform Version/Commit: [e.g. v0.3.0, commit SHA]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, Traces, and Error Messages
      description: |
        Paste any relevant logs, error messages, traces, or screenshots
        
        **Tips**:
        - Port-forwards (prometheus/grafana/jaeger/kiali): note namespaces/commands used
        - k6 load tests: include test file name and Grafana panel if relevant
        - Mesh/Ingress: include Istio virtual service/gateway snippets if relevant
        - You can attach images by clicking this area to highlight it and then dragging files in.
      placeholder: |
        ```
        Paste logs/traces here...
        ```
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: Any additional information that might be helpful...
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to contribute a fix?
      options:
        - label: I would be willing to submit a PR to fix this issue
          required: false 