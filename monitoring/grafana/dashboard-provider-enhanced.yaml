apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider-enhanced
  namespace: monitoring
data:
  dashboards-enhanced.yaml: |
    apiVersion: 1
    providers:
    - name: 'E-Commerce Enhanced Service Metrics'
      orgId: 1
      folder: 'E-Commerce'
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /var/lib/grafana/dashboards/ecommerce-enhanced-service-metrics